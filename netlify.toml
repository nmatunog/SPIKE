# SPIKE frontend (Vite → dist). API stays on a separate Node host; set VITE_API_URL in Netlify.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA: client-side app (matches public/_redirects copied into dist by Vite)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional hardening for the static shell (API sets its own CORS)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
