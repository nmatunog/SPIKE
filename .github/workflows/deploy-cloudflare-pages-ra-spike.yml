name: Deploy RA-SPIKE to Cloudflare Pages

on:
  push:
    branches: [ra-spike]
  workflow_dispatch:

concurrency:
  group: ra-spike-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify RA-SPIKE deploy secrets
        env:
          RA_SPIKE_CLOUDFLARE_API_TOKEN: ${{ secrets.RA_SPIKE_CLOUDFLARE_API_TOKEN }}
          RA_SPIKE_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.RA_SPIKE_CLOUDFLARE_ACCOUNT_ID }}
          RA_SPIKE_VITE_SUPABASE_URL: ${{ secrets.RA_SPIKE_VITE_SUPABASE_URL }}
          RA_SPIKE_VITE_SUPABASE_ANON_KEY: ${{ secrets.RA_SPIKE_VITE_SUPABASE_ANON_KEY }}
          RA_SPIKE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RA_SPIKE_SUPABASE_SERVICE_ROLE_KEY }}
          RA_SPIKE_SETUP_SECRET: ${{ secrets.RA_SPIKE_SETUP_SECRET }}
        run: |
          missing=0
          for name in \
            RA_SPIKE_CLOUDFLARE_API_TOKEN \
            RA_SPIKE_CLOUDFLARE_ACCOUNT_ID \
            RA_SPIKE_VITE_SUPABASE_URL \
            RA_SPIKE_VITE_SUPABASE_ANON_KEY \
            RA_SPIKE_SUPABASE_SERVICE_ROLE_KEY \
            RA_SPIKE_SETUP_SECRET
          do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is missing. Run: bash scripts/setup-github-deploy-secrets-ra-spike.sh"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build (RA-SPIKE Supabase env baked in)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.RA_SPIKE_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.RA_SPIKE_VITE_SUPABASE_ANON_KEY }}
          VITE_STATIC_ONLY: 'false'
          VITE_MOCK_AUTH: 'false'

      - name: Verify dist assets
        run: node scripts/verify-dist-assets.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RA_SPIKE_SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.RA_SPIKE_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.RA_SPIKE_VITE_SUPABASE_ANON_KEY }}
          SETUP_SECRET: ${{ secrets.RA_SPIKE_SETUP_SECRET }}
        with:
          apiToken: ${{ secrets.RA_SPIKE_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.RA_SPIKE_CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name ra-spike --branch ra-spike
